steps:
  # Step 1: Build Docker image for development
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/bni-conversation-service-develop:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/bni-conversation-service-develop:$BRANCH_NAME'
      - '-t'
      - 'gcr.io/$PROJECT_ID/bni-conversation-service-develop:latest'
      - '--cache-from'
      - 'gcr.io/$PROJECT_ID/bni-conversation-service-develop:latest'
      - '--build-arg'
      - 'BUILDKIT_INLINE_CACHE=1'
      - '-f'
      - 'Dockerfile'
      - '.'
    id: 'build'

  # Step 2: Push image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/bni-conversation-service-develop:latest'
    id: 'push'

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/run'
    args:
      - 'deploy'
      - 'bni-conversation-service-develop'
      - '--image=gcr.io/$PROJECT_ID/bni-conversation-service-develop:latest'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--concurrency=50'
      - '--timeout=300'
      - '--set-env-vars=ENVIRONMENT=development'
    id: 'deploy'

# Build configuration
options:
  machineType: 'N1_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
  sourceProvenanceHash:
    - SHA256

# Images to push to Container Registry
images:
  - 'gcr.io/$PROJECT_ID/bni-conversation-service-develop:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/bni-conversation-service-develop:latest'

# Timeout
timeout: 1800s

# Substitutions
substitutions:
  _REGION: 'us-central1'
  _SERVICE_NAME: 'bni-conversation-service-develop'

# Trigger configuration (applied in Cloud Console)
# Trigger on: Push to develop branch
# Branch: ^develop$
